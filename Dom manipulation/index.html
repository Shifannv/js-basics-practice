<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Changer</title>
    <style>
      #colorBox {
        width: 200px;
        height: 200px;
        background-color: rgb(255, 4, 4);
        color: black;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
        font-weight: bold;
        border-radius: 10px;
        transition:
          background-color 0.3s,
          color 0.3s;
          -ms-zoom-animation: 1000s;
        cursor: pointer;

      }
    </style>
  </head>
  <body>
    <div id="colorBox">Touch Me!</div>

    <script src="./index.js">
    </script>
  </body>
</html>
