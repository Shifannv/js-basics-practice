<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fetch API Search</title>
  <script src="./index.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .search-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-group {
      flex: 1;
      min-width: 240px;
    }
    .search-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    .search-group input {
      width: 100%;
      padding: 10px 12px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .search-group .search-action {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .search-group button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    .result-box {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 18px;
      min-height: 120px;
    }
    .result-box img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      display: block;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Fetch API Search</h1>
  <div class="search-row">
    <div class="search-group">
      <label for="userInput">Enter a GitHub name</label>
      <input id="userInput" type="text" placeholder="GitHub username">
    </div>
    <div class="search-group">
      <label  for="pokemonInput">Enter a Pokemon name</label>
      <div class="search-action">
        <input id="pokemonName" id="pokemonInput" type="text" placeholder="Pokemon name">
        <button onclick="fetchData()" id="pokemonButton" type="button">fetch pokemon</button>
      </div>
      
    </div>

  </div>
  <br>
        <img src="" alt="pokemonSprite" id="pokemonSprite" style="display: none;">

    const userResult = document.getElementById('userResult');

    function showUserResult(data) {
      if (!data || data.message === 'Not Found') {
        userResult.innerHTML = '<p>User not found.</p>';
        return;
      }
      userResult.innerHTML = `
        <h2>${data.login}</h2>
        <img src="${data.avatar_url}" alt="${data.login}">
        <p><a href="${data.html_url}" target="_blank" rel="noreferrer">View profile</a></p>
      `;
    }

    async function fetchGitHubUser(name) {
      const trimmed = name.trim();
      if (!trimmed) {
        userResult.innerHTML = '<p>Type a GitHub username above and press Enter.</p>';
        return;
      }
      userResult.innerHTML = '<p>Loading...</p>';
      try {
        const response = await fetch(`https://api.github.com/users/${encodeURIComponent(trimmed)}`);
        const data = await response.json();
        showUserResult(data);
      } catch (error) {
        userResult.innerHTML = '<p>Error loading user.</p>';
      }
    }
